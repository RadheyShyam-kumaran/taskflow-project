# ================================
# TaskFlow - Application Properties
# ================================

spring.application.name=taskflow-backend
server.port=8080

# ---- Active Profile (dev uses H2, prod uses PostgreSQL) ----
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- H2 In-Memory DB (DEV profile) ----
spring.datasource.url=${DB_URL:jdbc:h2:mem:taskflowdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Sample Data on Startup ----
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- Actuator (for health checks in deployment) ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
