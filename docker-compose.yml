version: '3.9'

services:

  # ── PostgreSQL Database ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflowdb
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/taskflowdb
      DB_DRIVER: org.postgresql.Driver
      DB_USER: taskflow
      DB_PASS: taskflow_secret
      JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskflow-net

  # ── React Frontend (Nginx) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow-net

volumes:
  postgres_data:

networks:
  taskflow-net:
    driver: bridge
